<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Landing educativa inspirada en un festival de música.">
    <title>Festival Estéreo Picnic 2027</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="hero">
    <nav class="navegacion" aria-label="Navegación principal">
        <a class="marca" href="#">FEP 2027</a>

        <section class="menu" aria-label="Enlaces del sitio">
            <a href="#artistas">Cartel</a>
            <a href="#informacion">Información</a>
            <a href="#contacto">Contacto</a>
        </section>
    </nav>

    <section class="hero-contenido">
        <p class="hero-etiqueta">Bogotá · Marzo de 2027</p>
        <h1>Festival<br>Estéreo Picnic</h1>
        <p class="hero-frase">Un Mundo Distinto</p>
        <a class="boton-principal" href="#artistas">Explorar el cartel</a>

        <p class="resumen-intereses">
            Artistas que te interesan:
            <span id="contador">0</span>
        </p>
    </section>

    <section class="paisaje" aria-hidden="true">
        <span class="sol"></span>
        <span class="nube nube-uno"></span>
        <span class="nube nube-dos"></span>
        <span class="montana montana-uno"></span>
        <span class="montana montana-dos"></span>
        <span class="montana montana-tres"></span>
    </section>
</header>
    <script src="app.js"></script>

</html>
